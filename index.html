    <!-- Event snippet for Purchase conversion page -->
    <script>
    function gtag_report_purchase(btn) {
      gtag('event', 'conversion', {
        'send_to': 'AW-17975842669/QcbWCNXgp_8bEO2uxvtC',
        'value': 1.0,
        'currency': 'EUR',
        'transaction_id': Date.now().toString(36) + Math.random().toString(36).slice(2)
      });
      btn.textContent = 'Purchased!';
      btn.disabled = true;
      return false;
    }
    </script>

    <!-- Event snippet for Click to call conversion page -->
    <script>
    function gtag_report_conversion(url) {
      var callback = function () {
        if (typeof(url) != 'undefined') {
          window.location = url;
        }
      };
      gtag('event', 'conversion', {
          'send_to': 'AW-17975842669/SGgYCJfilf8bEO2uxvtC',
          'value': 1.0,
          'currency': 'EUR',
          'transaction_id': Date.now().toString(36) + Math.random().toString(36).slice(2),
          'event_callback': callback
      });
      return false;
    }
    </script>

    <!-- Event snippet for Sign-up conversion page -->
    <script>
    function gtag_report_signup(btn) {
      gtag('event', 'conversion', {
        'send_to': 'AW-17974174858/l3nnCJPdl_8bEIrJ4PpC',
        'transaction_id': Date.now().toString(36) + Math.random().toString(36).slice(2)
      });
      btn.textContent = 'Signed up!';
      btn.disabled = true;
      return false;
    }
    </script>
